<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <!-- Background pill (opcional, remova se quiser fundo transparente) -->

  <!-- Ícone: engrenagem + ferramenta combinados -->
  <g transform="translate(8, 8)">
    <!-- Círculo externo da engrenagem -->
    <circle cx="32" cy="32" r="28" fill="#fff7ed" />

    <!-- Dentes da engrenagem -->
    <rect x="29" y="2" width="6" height="9" rx="2" fill="#f97316"/>
    <rect x="29" y="53" width="6" height="9" rx="2" fill="#f97316"/>
    <rect x="2" y="29" width="9" height="6" rx="2" fill="#f97316"/>
    <rect x="53" y="29" width="9" height="6" rx="2" fill="#f97316"/>

    <!-- Dentes diagonais -->
    <rect x="8" y="8" width="6" height="9" rx="2" fill="#f97316" transform="rotate(45 11 12.5)"/>
    <rect x="49" y="8" width="6" height="9" rx="2" fill="#f97316" transform="rotate(-45 52 12.5)"/>
    <rect x="8" y="47" width="6" height="9" rx="2" fill="#f97316" transform="rotate(-45 11 51.5)"/>
    <rect x="49" y="47" width="6" height="9" rx="2" fill="#f97316" transform="rotate(45 52 51.5)"/>

    <!-- Círculo interno -->
    <circle cx="32" cy="32" r="20" fill="#f97316"/>
    <circle cx="32" cy="32" r="12" fill="#fff7ed"/>

    <!-- Chave inglesa estilizada dentro -->
    <g transform="translate(32,32) rotate(-35)">
      <!-- Cabo da chave -->
      <rect x="-3" y="-2" width="18" height="4" rx="2" fill="#f97316"/>
      <!-- Cabeça da chave -->
      <rect x="-14" y="-6" width="12" height="12" rx="3" fill="#f97316"/>
      <rect x="-12" y="-3" width="4" height="6" rx="1" fill="#fff7ed"/>
    </g>
  </g>

  <!-- Texto: Share -->
  <text x="80" y="46" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="30" fill="#111827" letter-spacing="-0.5">Share</text>
  <!-- Texto: Tools -->
  <text x="172" y="46" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="30" fill="#f97316" letter-spacing="-0.5">Tools</text>

  <!-- Tagline -->
  <text x="80" y="62" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="11" fill="#6b7280" letter-spacing="1.5">ALUGUEL DE FERRAMENTAS</text>
</svg>
